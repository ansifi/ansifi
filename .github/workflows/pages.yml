# Publish the full repo so site paths match /ansifi/ansif/... (site lives under ansif/).
name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare publish tree
        run: |
          mkdir -p publish
          # Site under ansif/ + root redirect + profile README for Pages entry
          cp -a ansif publish/
          cp -a index.html README.md publish/
          touch publish/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish
      - id: deployment
        uses: actions/deploy-pages@v4
